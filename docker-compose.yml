services:
  simfar:
    # Bangun dari sumber (clone repo ke server lalu `docker compose up -d`).
    build: .
    # Atau pakai image prebuilt dari GitHub Actions (hapus baris `build` di atas):
    # image: ghcr.io/mentionabbe-wq/simfar:latest
    image: simfar:latest
    container_name: simfar
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Akun admin awal — ganti sebelum deploy produksi:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      - simfar-data:/app/server/data
      - simfar-uploads:/app/server/uploads

volumes:
  simfar-data:
  simfar-uploads:
