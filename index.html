<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#185fa5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SimFar">
<title>SimFar — Alkes & BMHP</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f1efe8;
  --b1:rgba(0,0,0,.09);--b2:rgba(0,0,0,.18);
  --t1:#1a1a18;--t2:#5f5e5a;--t3:#888780;
  --info:#185fa5;--info-bg:#e6f1fb;
  --ok:#3b6d11;--ok-bg:#eaf3de;
  --warn:#854f0b;--warn-bg:#faeeda;
  --err:#a32d2d;--err-bg:#fcebeb;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.6;-webkit-tap-highlight-color:transparent;overflow-wrap:break-word}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--b2);border-radius:var(--r);background:var(--surface);color:var(--t1);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--info);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;min-height:72px}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:0.5px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-logo{padding:16px 18px;border-bottom:0.5px solid var(--b1)}
.sb-logo h1{font-size:15px;font-weight:500}
.sb-logo p{font-size:11px;color:var(--t3);margin-top:1px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:10px 18px 4px;font-size:10px;font-weight:500;color:var(--t3);letter-spacing:.07em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;font-size:13px;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:background .1s}
.nav-item:hover{background:var(--surface2);color:var(--t1)}
.nav-item.active{background:var(--info-bg);color:var(--info);border-left-color:var(--info);font-weight:500}
.nav-item i{font-size:17px}
.sb-user{padding:14px 18px;border-top:0.5px solid var(--b1)}
.sb-user .u-name{font-size:13px;font-weight:500}
.sb-user .u-role{font-size:11px;color:var(--t3);margin-top:1px}
.btn-logout{margin-top:10px;width:100%;padding:6px;font-size:12px;background:none;border:0.5px solid var(--b2);border-radius:var(--r);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-logout:hover{background:var(--surface2)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:14px 24px;border-bottom:0.5px solid var(--b1);background:var(--surface);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h2{font-size:16px;font-weight:500}
.topbar .bc{font-size:12px;color:var(--t3);margin-top:1px}
.content{padding:24px;flex:1}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:0.5px solid var(--b1);border-radius:var(--rl);padding:14px 16px}
.s-val{font-size:26px;font-weight:500;line-height:1.2}
.s-lbl{font-size:12px;color:var(--t3);margin-top:3px}
.card{background:var(--surface);border:0.5px solid var(--b1);border-radius:var(--rl);padding:18px 20px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-hd h3{font-size:14px;font-weight:500}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--r);font-size:11px;font-weight:500}
.b-pending{background:var(--warn-bg);color:var(--warn)}
.b-diproses{background:var(--info-bg);color:var(--info)}
.b-sebagian{background:#EEEDFE;color:#534AB7}
.b-selesai{background:var(--ok-bg);color:var(--ok)}
.b-ditolak{background:var(--err-bg);color:var(--err)}
.b-menunggu{background:var(--warn-bg);color:var(--warn)}
.b-disetujui{background:var(--ok-bg);color:var(--ok)}
.b-dipesan{background:var(--info-bg);color:var(--info)}
.b-diberikan{background:var(--ok-bg);color:var(--ok)}
.b-pengajuan{background:var(--warn-bg);color:var(--warn)}
.b-alkes{background:var(--info-bg);color:var(--info)}
.b-bmhp{background:#EEEDFE;color:#534AB7}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--t3);text-align:left;padding:7px 12px;border-bottom:0.5px solid var(--b1);white-space:nowrap}
td{font-size:13px;padding:10px 12px;border-bottom:0.5px solid var(--b1);color:var(--t1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.tlink{color:var(--info);cursor:pointer;font-size:13px}
.tlink:hover{text-decoration:underline}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;transition:opacity .15s;white-space:nowrap}
.btn-primary{background:var(--info-bg);color:var(--info);font-weight:500}
.btn-primary:hover{opacity:.75}
.btn-success{background:var(--ok-bg);color:var(--ok);font-weight:500}
.btn-success:hover{opacity:.75}
.btn-warn{background:var(--warn-bg);color:var(--warn);font-weight:500}
.btn-warn:hover{opacity:.75}
.btn-danger{background:var(--err-bg);color:var(--err);font-weight:500}
.btn-danger:hover{opacity:.75}
.btn-ghost{background:none;border:0.5px solid var(--b2);color:var(--t2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:5px 11px;font-size:12px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:12px;font-weight:500;color:var(--t2)}
.req{color:var(--err)}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:0.5px solid var(--b1);margin-top:6px}
.item-header{display:grid;grid-template-columns:2.5fr 1fr 80px 80px 34px;gap:8px;margin-bottom:4px}
.item-header span{font-size:11px;color:var(--t3);font-weight:500}
.item-row{display:grid;grid-template-columns:2.5fr 1fr 80px 80px 34px;gap:8px;align-items:center;margin-bottom:8px}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:0.5px solid var(--b1)}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab:hover{color:var(--t1)}
.tab.active{color:var(--info);border-bottom-color:var(--info);font-weight:500}
.proc-item{background:var(--surface2);border:0.5px solid var(--b1);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.proc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.proc-name{font-size:14px;font-weight:500}
.proc-radio{display:flex;gap:16px;flex-wrap:wrap}
.proc-radio label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--t1);font-weight:400}
.proc-radio input[type=radio]{width:auto;cursor:pointer}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.dr{display:flex;flex-direction:column;gap:2px}
.dr-lbl{font-size:11px;color:var(--t3)}
.dr-val{font-size:13px}
.empty{text-align:center;padding:3rem;color:var(--t3)}
.empty i{font-size:36px;display:block;margin-bottom:8px}
.empty p{font-size:13px}
.info-box{padding:12px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
.info-box.warn{background:var(--warn-bg);color:var(--warn)}
.info-box.ok{background:var(--ok-bg);color:var(--ok)}
.info-box.info{background:var(--info-bg);color:var(--info)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-box{background:var(--surface);border:0.5px solid var(--b1);border-radius:var(--rl);padding:2rem;max-width:520px;width:100%}
.login-box h1{font-size:20px;font-weight:500;margin-bottom:4px}
.login-box .sub{font-size:13px;color:var(--t3);margin-bottom:1.5rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:1rem}
.role-card{border:0.5px solid var(--b1);border-radius:var(--rl);padding:16px 12px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.role-card:hover{border-color:var(--info);background:var(--info-bg)}
.role-card.sel{border-color:var(--info);background:var(--info-bg)}
.role-card i{font-size:26px;display:block;margin-bottom:8px}
.role-card .rn{font-size:13px;font-weight:500}
.role-card .rd{font-size:11px;color:var(--t3);margin-top:2px}
.user-sel{display:none;margin-top:1rem}
.user-sel.vis{display:block}
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:#1a1a18;color:#f1efe8;padding:10px 18px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:8px;white-space:nowrap;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sep{height:0.5px;background:var(--b1);margin:12px 0}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--b2);flex-shrink:0;margin-top:5px;position:relative;z-index:1}
.tl-dot.ok{background:var(--ok)}
.tl-dot.info{background:var(--info)}
.tl-dot.warn{background:var(--warn)}
.tl-line{position:absolute;left:4px;top:14px;bottom:0;width:1.5px;background:var(--b1)}
.tl-content{flex:1}
.tl-title{font-size:13px;font-weight:500}
.tl-sub{font-size:12px;color:var(--t3)}
.upload-zone{border:1.5px dashed var(--b2);border-radius:var(--r);padding:1.5rem;text-align:center;cursor:pointer;transition:background .15s}
.upload-zone:hover,.upload-zone.drag{background:var(--surface2)}
.upload-zone i{font-size:28px;color:var(--t3);display:block;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--t2)}
.upload-zone span{font-size:11px;color:var(--t3);display:block;margin-top:3px}
input[type=file]{display:none}
.flist{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.fitem{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--r);border:0.5px solid var(--b1)}
.fi-ic{font-size:16px;color:var(--info)}
.fi-nm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-sz{font-size:11px;color:var(--t3);flex-shrink:0}
.fi-rm{background:none;border:none;cursor:pointer;color:var(--t3);padding:2px;font-size:13px;display:flex;align-items:center;flex-shrink:0}
.fi-rm:hover{color:var(--err)}
.doc-section{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--b1)}
.doc-section-title{font-size:12px;font-weight:500;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.doc-section-sub{font-size:12px;color:var(--t3);margin-bottom:10px}
/* Tombol menu (hamburger) & latar drawer — hanya tampil di mobile */
.nav-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;flex-shrink:0;margin-right:12px;background:none;border:0.5px solid var(--b2);border-radius:var(--r);color:var(--t1);cursor:pointer}
.nav-toggle i{font-size:20px}
.nav-backdrop{display:none}

@media(max-width:640px){
  .nav-toggle{display:inline-flex}
  /* Sidebar jadi drawer geser dari kiri */
  .sidebar{position:fixed;top:0;left:0;height:100dvh;width:78vw;max-width:300px;transform:translateX(-100%);transition:transform .25s ease;z-index:300;box-shadow:2px 0 20px rgba(0,0,0,.25);padding-top:env(safe-area-inset-top)}
  .shell.nav-open .sidebar{transform:translateX(0)}
  .nav-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:250;opacity:0;pointer-events:none;transition:opacity .25s ease}
  .shell.nav-open .nav-backdrop{opacity:1;pointer-events:auto}
  .nav-item{padding:12px 18px}            /* target sentuh lebih besar */
  .topbar{padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top))}
  .content{padding:16px}
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .role-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .item-header{display:none}             /* header kolom disembunyikan, baris jadi stack */
  .item-row{grid-template-columns:1fr 1fr;gap:8px;padding:10px;border:0.5px solid var(--b1);border-radius:var(--r);margin-bottom:10px}
  .form-actions{flex-wrap:wrap}
  .form-actions .btn{flex:1;justify-content:center}
  /* Input ≥16px agar iOS tidak auto-zoom saat fokus */
  input,select,textarea{font-size:16px}
  table{font-size:13px}
  th,td{padding:8px 10px}
}
</style>

<body>
<div id="root"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ── State ──────────────────────────────────────────────────────────────
// Data transaksional dimuat dari backend via loadAll(); cache lokal di bawah.
const S = {
  user: null, page: 'login', tab: 0,
  detailId: null, prosesId: null, keDetailId: null, stId: null,
  permintaan: [], pengajuan: [], anggaran: [],
  stok: [], pemakaian: [], opname: [],   // inventaris lab (dimuat bila role laboratorium)
  users: [],                             // daftar pengguna (dimuat bila role admin)
  _docReq: [],   // staging lampiran permintaan (berisi {id,name,size,type} hasil unggah)
  _docPO: {},    // staging surat pesanan per permintaan
};

// ── Helpers ────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fdate(s){if(!s)return '-';const d=new Date(s);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}
function fdt(s){if(!s)return '-';const d=new Date(s);if(isNaN(d))return esc(s);return d.toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fcurr(n){return 'Rp '+Number(n||0).toLocaleString('id-ID')}

function badge(s){
  const cls={pending:'b-pending',diproses:'b-diproses',sebagian:'b-sebagian',selesai:'b-selesai',
    ditolak:'b-ditolak',menunggu:'b-menunggu',disetujui:'b-disetujui',dipesan:'b-dipesan',
    diberikan:'b-diberikan',pengajuan:'b-pengajuan'};
  const lbl={pending:'Pending',diproses:'Diproses',sebagian:'Sebagian',selesai:'Selesai',
    ditolak:'Ditolak',menunggu:'Menunggu',disetujui:'Disetujui',dipesan:'Dipesan',
    diberikan:'Diberikan',pengajuan:'Perlu Pesan'};
  return `<span class="badge ${cls[s]||'b-pending'}">${lbl[s]||s}</span>`;
}

function toast(msg,type='ok'){
  const t=document.createElement('div');t.className='toast';
  const ic=type==='ok'?'ti-circle-check':type==='warn'?'ti-alert-triangle':'ti-info-circle';
  t.innerHTML=`<i class="ti ${ic}" style="font-size:15px"></i>${esc(msg)}`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

// ── API client ─────────────────────────────────────────────────────────
// Bekerja dua mode: jika backend Node aktif → pakai server; jika tidak →
// fallback ke mesin lokal berbasis localStorage (lihat localApi di bawah).
const API='';
let USE_LOCAL=false;

async function api(path,{method='GET',json,body,headers={}}={}){
  if(USE_LOCAL)return localApi(path,{method,json,body});
  const opts={method,headers:{...headers}};
  if(body!==undefined)opts.body=body;
  if(json!==undefined){opts.body=JSON.stringify(json);opts.headers['Content-Type']='application/json';}
  const res=await fetch(API+path,opts);
  const ct=res.headers.get('content-type')||'';
  const data=ct.includes('application/json')?await res.json():await res.text();
  if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));
  return data;
}

// Probe sekali saat boot untuk menentukan mode.
async function serverAlive(){
  try{
    const res=await fetch(API+'/api/health',{method:'GET'});
    if(!res.ok)return false;
    const d=await res.json();
    return !!(d&&d.ok);
  }catch(e){return false;}
}

// ── Mesin lokal (localStorage) — mirror dari REST API server ────────────
const LS_KEY='simfar_db_v5';
let _memDB=null; // fallback bila localStorage diblokir (mis. sebagian browser di file://)
function lsLoad(){try{const r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r);}catch(e){}return _memDB;}
function lsSave(db){_memDB=db;try{localStorage.setItem(LS_KEY,JSON.stringify(db));}catch(e){}}
function getLocalDB(){let db=lsLoad();if(!db){db=seedLocal();lsSave(db);}return db;}
function resetLocalDB(){_memDB=null;try{localStorage.removeItem(LS_KEY);}catch(e){}}

function seedLocal(){
  // Hanya akun admin bawaan untuk login pertama. Pengguna lain mendaftar sendiri.
  const users=[
    {id:1,nama:'Administrator',ruangan:'Semua Ruangan',role:'admin',username:'admin',password:'admin123',createdAt:new Date().toISOString(),lastLogin:null,loginCount:0},
  ];
  return {users,permintaan:[],pengajuan:[],anggaran:[],stok:[],pemakaian:[],opname:[],files:[],seq:{item:1,poItem:1,stok:1,file:1}};
}

function resolveFilesLocal(db,ids){
  if(!Array.isArray(ids)||!ids.length)return[];
  return ids.map(id=>db.files.find(f=>f.id===id)).filter(Boolean).map(f=>({id:f.id,name:f.name,size:f.size,type:f.type}));
}
function upsertStokLocal(db,ruangan,it){
  const ex=db.stok.find(s=>s.ruangan===ruangan&&s.nama===it.nama);
  if(ex){ex.jumlah+=it.jumlah;ex.harga=it.harga??ex.harga;ex.satuan=it.satuan||ex.satuan;ex.jenis=it.jenis||ex.jenis;}
  else{db.stok.push({id:db.seq.stok++,ruangan,nama:it.nama,jenis:it.jenis||'alkes',satuan:it.satuan||'pcs',jumlah:it.jumlah,harga:it.harga||0});}
}
function calcUsedLocal(db,ruangan,bulan){
  return db.permintaan.filter(p=>p.ruangan===ruangan&&String(p.tanggal).slice(0,7)===bulan&&p.statusSerahTerima==='selesai')
    .reduce((sum,p)=>sum+p.items.reduce((s,it)=>s+(it.harga||0)*it.jumlah,0),0);
}

function localApi(path,{method='GET',json,body}={}){
  const db=getLocalDB();
  const save=()=>lsSave(db);
  const [rp,qs]=path.split('?');
  const q=Object.fromEntries(new URLSearchParams(qs||''));
  const parts=rp.split('/').filter(Boolean); // ['api', resource, id?, action?]
  const m=method.toUpperCase();
  const today='2026-06-20';
  const E=(msg)=>{throw new Error(msg);};
  const nid=(prefix,list)=>{let mx=0;list.forEach(x=>{const n=parseInt(String(x.id).split('-')[1],10);if(!isNaN(n)&&n>mx)mx=n;});return prefix+'-'+String(mx+1).padStart(3,'0');};
  const res=parts[1];

  // /api/users → daftar pengguna (tanpa password) untuk monitoring admin
  if(res==='users'&&m==='GET'){
    return Promise.resolve(db.users.map(u=>({id:u.id,nama:u.nama,username:u.username,role:u.role,ruangan:u.ruangan,createdAt:u.createdAt||null,lastLogin:u.lastLogin||null,loginCount:u.loginCount||0})));
  }

  // /api/register
  if(res==='register'&&m==='POST'){
    const b=json||{};
    for(const k of ['nama','role','ruangan','username','password'])if(!b[k]||!String(b[k]).trim())E('Lengkapi semua kolom pendaftaran');
    if(!['keperawatan','laboratorium','farmasi','keuangan','manager','direktur'].includes(b.role))E('Bagian tidak valid');
    const uname=String(b.username).trim().toLowerCase();
    if(db.users.some(u=>(u.username||'').toLowerCase()===uname))E('Username sudah dipakai');
    const id=db.users.reduce((mx,u)=>Math.max(mx,u.id||0),0)+1;
    const user={id,nama:String(b.nama).trim(),ruangan:String(b.ruangan).trim(),role:b.role,username:uname,password:String(b.password),createdAt:new Date().toISOString(),lastLogin:null,loginCount:0};
    db.users.push(user);save();
    return Promise.resolve({id:user.id,nama:user.nama,ruangan:user.ruangan,role:user.role,username:user.username});
  }

  // /api/login
  if(res==='login'&&m==='POST'){
    const b=json||{};
    const uname=String(b.username||'').trim().toLowerCase();
    const u=db.users.find(u=>(u.username||'').toLowerCase()===uname&&u.password===b.password);
    if(!u)E('Username atau password salah');
    u.lastLogin=new Date().toISOString();u.loginCount=(u.loginCount||0)+1;save();
    return Promise.resolve({id:u.id,nama:u.nama,ruangan:u.ruangan,role:u.role,username:u.username});
  }

  // /api/permintaan
  if(res==='permintaan'){
    if(parts.length===2&&m==='GET'){
      let list=db.permintaan.slice();
      if(q.ruangan)list=list.filter(p=>p.ruangan===q.ruangan);
      if(q.status)list=list.filter(p=>p.status===q.status);
      if(q.sumber)list=list.filter(p=>p.sumber===q.sumber);
      return Promise.resolve(list);
    }
    if(parts.length===2&&m==='POST'){
      const b=json||{};
      if(!b.ruangan||!b.pemohon||!b.sumber)E('ruangan, pemohon, dan sumber wajib diisi');
      if(!b.keperluan||!String(b.keperluan).trim())E('Keperluan wajib diisi');
      const items=(Array.isArray(b.items)?b.items:[]).filter(it=>it&&String(it.nama||'').trim())
        .map(it=>({id:db.seq.item++,nama:String(it.nama).trim(),jenis:it.jenis==='bmhp'?'bmhp':'alkes',satuan:String(it.satuan||'pcs').trim()||'pcs',jumlah:Math.max(1,parseInt(it.jumlah,10)||1),statusItem:null,harga:0}));
      if(!items.length)E('Tambahkan minimal 1 item');
      const p={id:nid('REQ',db.permintaan),ruangan:b.ruangan,tanggal:b.tanggal||today,pemohon:b.pemohon,pemohonUsername:b.pemohonUsername||'',keperluan:String(b.keperluan).trim(),status:'pending',sumber:b.sumber,statusSerahTerima:null,items,dokumen:resolveFilesLocal(db,b.dokumenIds)};
      db.permintaan.push(p);save();return Promise.resolve(p);
    }
    const p=db.permintaan.find(x=>x.id===parts[2]);
    if(parts.length===3&&m==='GET'){if(!p)E('Data tidak ditemukan');return Promise.resolve({...p,pengajuan:db.pengajuan.filter(x=>x.permintaanId===p.id)});}
    if(parts[3]==='proses'&&m==='POST'){
      if(!p)E('Data tidak ditemukan');
      if(p.status==='selesai')E('Permintaan sudah selesai');
      const map=new Map((json?.items||[]).map(u=>[Number(u.itemId),u.statusItem]));
      for(const it of p.items){const st=map.get(it.id);if(st!=='diberikan'&&st!=='pengajuan')E(`Tentukan status untuk item "${it.nama}"`);}
      p.items.forEach(it=>{it.statusItem=map.get(it.id);});
      const needPO=p.items.filter(it=>it.statusItem==='pengajuan');
      let poId=null;
      if(needPO.length){
        const isLab=p.sumber==='laboratorium';
        poId=nid('PO',db.pengajuan);
        db.pengajuan.push({id:poId,permintaanId:p.id,ruangan:p.ruangan,tanggal:today,total:0,supplier:'',status:isLab?'disetujui':'menunggu',catatan:isLab?'PO langsung disetujui — permintaan laboratorium':'',suratPesanan:resolveFilesLocal(db,json?.suratPesananIds),items:needPO.map(it=>({id:db.seq.poItem++,nama:it.nama,satuan:it.satuan,jumlah:it.jumlah,harga:0}))});
        p.status=needPO.length===p.items.length?'diproses':'sebagian';
      }else{p.status='selesai';}
      save();return Promise.resolve({permintaan:p,pengajuanId:poId});
    }
    if(parts[3]==='serah-terima'&&m==='POST'){
      if(!p)E('Data tidak ditemukan');
      if(p.statusSerahTerima==='selesai')E('Serah terima sudah selesai');
      const map=new Map((json?.items||[]).map(u=>[Number(u.itemId),Math.max(0,parseInt(u.harga,10)||0)]));
      let total=0;p.items.forEach(it=>{const h=map.has(it.id)?map.get(it.id):it.harga;it.harga=h;total+=h*it.jumlah;});
      if(!total)E('Isi harga minimal satu item');
      p.items.forEach(it=>upsertStokLocal(db,p.ruangan,it));
      p.statusSerahTerima='selesai';p.status='selesai';
      const bulan=p.tanggal.slice(0,7);
      const ang=db.anggaran.find(a=>a.ruangan===p.ruangan&&a.bulan===bulan);
      const overBudget=ang?Math.max(0,calcUsedLocal(db,p.ruangan,bulan)-ang.nominal):0;
      save();return Promise.resolve({permintaan:p,total,overBudget});
    }
  }

  // /api/pengajuan
  if(res==='pengajuan'){
    if(parts.length===2&&m==='GET'){
      let list=db.pengajuan.slice();
      if(q.status)list=list.filter(x=>x.status===q.status);
      if(q.permintaanId)list=list.filter(x=>x.permintaanId===q.permintaanId);
      return Promise.resolve(list);
    }
    const po=db.pengajuan.find(x=>x.id===parts[2]);
    if(parts.length===3&&m==='GET'){if(!po)E('Data tidak ditemukan');return Promise.resolve(po);}
    if(parts[3]==='keputusan'&&m==='POST'){
      if(!po)E('Data tidak ditemukan');
      if(po.status!=='menunggu')E('Pengajuan sudah diproses');
      const b=json||{};
      if(b.action!=='disetujui'&&b.action!=='ditolak')E('action tidak valid');
      const map=new Map((b.items||[]).map(u=>[Number(u.itemId),Math.max(0,parseInt(u.harga,10)||0)]));
      let total=0;po.items.forEach(it=>{total+=(map.has(it.id)?map.get(it.id):it.harga)*it.jumlah;});
      if(b.action==='disetujui'){if(!b.supplier||!String(b.supplier).trim())E('Nama supplier wajib diisi');if(!total)E('Isi harga satuan item');}
      po.items.forEach(it=>{if(map.has(it.id))it.harga=map.get(it.id);});
      po.status=b.action;po.supplier=String(b.supplier||'').trim();po.catatan=String(b.catatan||'').trim();po.total=total;
      save();return Promise.resolve(po);
    }
  }

  // /api/anggaran
  if(res==='anggaran'){
    if(parts[2]==='usage'&&m==='GET'){
      const ang=db.anggaran.find(a=>a.ruangan===q.ruangan&&a.bulan===q.bulan);
      const nominal=ang?ang.nominal:0;const used=calcUsedLocal(db,q.ruangan,q.bulan);
      return Promise.resolve({ruangan:q.ruangan,bulan:q.bulan,nominal,used,sisa:nominal-used,pct:nominal>0?Math.min(100,Math.round(used/nominal*100)):0});
    }
    if(parts.length===2&&m==='GET'){
      let list=db.anggaran.slice();
      if(q.ruangan)list=list.filter(a=>a.ruangan===q.ruangan);
      if(q.bulan)list=list.filter(a=>a.bulan===q.bulan);
      return Promise.resolve(list);
    }
    if(parts.length===2&&m==='PUT'){
      const b=json||{};
      if(!b.ruangan||!b.bulan)E('ruangan dan bulan wajib diisi');
      const n=Math.max(0,parseInt(b.nominal,10)||0);if(!n)E('Nominal anggaran wajib diisi');
      const ex=db.anggaran.find(a=>a.ruangan===b.ruangan&&a.bulan===b.bulan);
      if(ex){ex.nominal=n;save();return Promise.resolve({...ex,updated:true});}
      const rec={id:nid('ANG',db.anggaran),ruangan:b.ruangan,bulan:b.bulan,nominal:n};db.anggaran.push(rec);save();return Promise.resolve({...rec,updated:false});
    }
  }

  // /api/stok , /api/stok/pemakaian , /api/stok/opname
  if(res==='stok'){
    if(parts.length===2&&m==='GET'){
      let list=db.stok.slice();if(q.ruangan)list=list.filter(s=>s.ruangan===q.ruangan);
      list.sort((a,b)=>a.nama.localeCompare(b.nama));return Promise.resolve(list);
    }
    if(parts.length===2&&m==='POST'){ // tambah item stok manual
      const b=json||{};
      if(!b.ruangan||!b.nama||!String(b.nama).trim())E('Ruangan dan nama item wajib diisi');
      const qty=Math.max(0,parseInt(b.jumlah,10)||0);
      if(qty<=0)E('Jumlah harus lebih dari 0');
      const hg=Math.max(0,parseInt(b.harga,10)||0);
      upsertStokLocal(db,b.ruangan,{nama:String(b.nama).trim(),jenis:b.jenis==='bmhp'?'bmhp':'alkes',satuan:String(b.satuan||'pcs').trim()||'pcs',jumlah:qty,harga:hg||undefined});
      save();
      return Promise.resolve(db.stok.find(s=>s.ruangan===b.ruangan&&s.nama===String(b.nama).trim()));
    }
    if(parts.length===3&&m==='PUT'&&parts[2]!=='pemakaian'&&parts[2]!=='opname'){ // edit item stok
      const b=json||{};
      const s=db.stok.find(x=>String(x.id)===String(parts[2]));
      if(!s)E('Item stok tidak ditemukan');
      if(!b.nama||!String(b.nama).trim())E('Nama item wajib diisi');
      const qty=Math.max(0,parseInt(b.jumlah,10));
      if(!Number.isFinite(qty))E('Jumlah tidak valid');
      s.nama=String(b.nama).trim();s.jenis=b.jenis==='bmhp'?'bmhp':'alkes';s.satuan=String(b.satuan||'pcs').trim()||'pcs';s.jumlah=qty;s.harga=Math.max(0,parseInt(b.harga,10)||0);
      save();return Promise.resolve(s);
    }
    if(parts[2]==='pemakaian'&&m==='GET'){
      return Promise.resolve(db.pemakaian.filter(x=>!q.ruangan||x.ruangan===q.ruangan).slice().reverse());
    }
    if(parts[2]==='pemakaian'&&m==='POST'){
      const b=json||{};if(!b.ruangan)E('ruangan wajib diisi');
      const clean=(b.items||[]).map(x=>({stokId:Number(x.stokId),jumlah:Math.max(0,parseInt(x.jumlah,10)||0)})).filter(x=>x.stokId&&x.jumlah>0);
      if(!clean.length)E('Tambahkan minimal 1 item pemakaian');
      for(const x of clean){const s=db.stok.find(s=>s.id===x.stokId&&s.ruangan===b.ruangan);if(!s)E('Item stok tidak ditemukan');if(x.jumlah>s.jumlah)E(`Stok "${s.nama}" tidak cukup (sisa ${s.jumlah})`);}
      const created=[];
      clean.forEach(x=>{const s=db.stok.find(s=>s.id===x.stokId);s.jumlah-=x.jumlah;const id=nid('PMK',db.pemakaian);db.pemakaian.push({id,ruangan:b.ruangan,stokId:s.id,nama:s.nama,satuan:s.satuan,jumlah:x.jumlah,tanggal:b.tanggal||today,pemakai:String(b.pemakai||'').trim(),keterangan:String(b.keterangan||'').trim()});created.push(id);});
      save();return Promise.resolve({created});
    }
    if(parts[2]==='opname'&&m==='GET'){
      return Promise.resolve(db.opname.filter(x=>!q.ruangan||x.ruangan===q.ruangan).slice().reverse());
    }
    if(parts[2]==='opname'&&m==='POST'){
      const b=json||{};if(!b.ruangan)E('ruangan wajib diisi');
      const clean=(b.items||[]).map(x=>({stokId:Number(x.stokId),fisik:Math.max(0,parseInt(x.fisik,10))})).filter(x=>x.stokId&&Number.isFinite(x.fisik));
      if(!clean.length)E('Isi hasil hitung fisik minimal 1 item');
      let totalSelisih=0,disesuaikan=0;const oitems=[];
      clean.forEach(x=>{const s=db.stok.find(s=>s.id===x.stokId&&s.ruangan===b.ruangan);if(!s)return;const selisih=x.fisik-s.jumlah;oitems.push({stokId:s.id,nama:s.nama,sistem:s.jumlah,fisik:x.fisik,selisih});if(selisih!==0){s.jumlah=x.fisik;disesuaikan++;}totalSelisih+=selisih;});
      const id=nid('OPN',db.opname);
      db.opname.push({id,ruangan:b.ruangan,tanggal:b.tanggal||today,petugas:String(b.petugas||'').trim(),catatan:String(b.catatan||'').trim(),jumlahItem:clean.length,totalSelisih,items:oitems});
      save();return Promise.resolve({id,disesuaikan,totalSelisih});
    }
  }

  // /api/files (hanya metadata di mode lokal — unduhan tidak tersedia offline)
  if(res==='files'&&m==='POST'){
    const out=[];const files=body&&body.getAll?body.getAll('files'):[];
    files.forEach(f=>{const rec={id:db.seq.file++,name:f.name,size:f.size,type:f.type};db.files.push(rec);out.push(rec);});
    save();return Promise.resolve(out);
  }

  return Promise.reject(new Error('Endpoint lokal tidak ditemukan: '+m+' '+rp));
}

// Peran "admin-like" (akses penuh ke menu pengawasan): admin, manager, direktur.
const ADMIN_ROLES=['admin','manager','direktur'];
function isAdminLike(r){return ADMIN_ROLES.includes(r);}

// Muat seluruh koleksi transaksional dari server ke cache S sebelum render.
async function loadAll(){
  const role=S.user?.role;
  const [permintaan,pengajuan,anggaran]=await Promise.all([
    api('/api/permintaan'),api('/api/pengajuan'),api('/api/anggaran')
  ]);
  S.permintaan=permintaan;S.pengajuan=pengajuan;S.anggaran=anggaran;
  if(role==='laboratorium'||isAdminLike(role)||role==='farmasi'){
    // Lab → stok ruangannya saja; Farmasi/Admin → semua ruangan (tanpa filter).
    const r=role==='laboratorium'?'?ruangan='+encodeURIComponent(S.user.ruangan):'';
    const [stok,pemakaian,opname]=await Promise.all([
      api('/api/stok'+r),api('/api/stok/pemakaian'+r),api('/api/stok/opname'+r)
    ]);
    S.stok=stok;S.pemakaian=pemakaian;S.opname=opname;
  }
  if(role==='admin')S.users=await api('/api/users'); // monitoring pengguna (admin saja)
}

const UP_OK=['application/pdf','application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'image/jpeg','image/png'];
// Validasi di klien lalu unggah ke /api/files → balik [{id,name,size,type}].
async function uploadFiles(files){
  const fd=new FormData();let any=false;
  Array.from(files).forEach(f=>{
    if(!UP_OK.includes(f.type)){toast('Format tidak didukung: '+f.name,'warn');return;}
    if(f.size>10*1024*1024){toast('File terlalu besar (maks 10 MB): '+f.name,'warn');return;}
    fd.append('files',f);any=true;
  });
  if(!any)return[];
  try{return await api('/api/files',{method:'POST',body:fd});}
  catch(e){toast('Gagal mengunggah: '+e.message,'warn');return[];}
}

async function go(page,params={}){
  if(page.startsWith('my-')){
    const px=S.user?.role==='laboratorium'?'lab':'k';
    page=px+page.slice(2);
  }
  S.page=page;Object.assign(S,params);
  S._stokFormOpen=false;S._stokEdit=null; // tutup form stok saat pindah halaman
  if(S.user&&page!=='login'){
    try{await loadAll();}catch(e){toast('Gagal memuat data dari server: '+e.message,'warn');}
  }
  render();window.scrollTo(0,0);
}

  return `<div class="login-wrap"><div class="login-box">
  <h1><i class="ti ti-medical-cross" style="color:var(--info);font-size:17px;vertical-align:-2px"></i> SimFar</h1>

function regBagianChange(){
  const role=document.getElementById('rg-bagian')?.value;
  const rg=document.getElementById('rg-ruangan');if(!rg)return;
  if(role==='farmasi'){rg.value='Instalasi Farmasi';rg.readOnly=true;}
  else if(role==='keuangan'){rg.value='Bagian Keuangan';rg.readOnly=true;}
  else if(role==='manager'){rg.value='Manajemen';rg.readOnly=true;}
  else if(role==='direktur'){rg.value='Direksi';rg.readOnly=true;}

async function doLogin(){
  const username=document.getElementById('lg-user')?.value?.trim();
  const password=document.getElementById('lg-pass')?.value||'';
  if(!username||!password){toast('Isi username dan password','warn');return;}
  try{
    const user=await api('/api/login',{method:'POST',json:{username,password}});
    S.user=user;S._prefillUser='';
    go(HOME_BY_ROLE[user.role]||'k-home');
  }catch(e){toast(e.message,'warn');}
}

async function doRegister(){
  const nama=document.getElementById('rg-nama')?.value?.trim();
  const role=document.getElementById('rg-bagian')?.value;
  const ruangan=document.getElementById('rg-ruangan')?.value?.trim();
  const username=document.getElementById('rg-user')?.value?.trim();
  const password=document.getElementById('rg-pass')?.value||'';
  if(!nama||!role||!ruangan||!username||!password){toast('Lengkapi semua kolom pendaftaran','warn');return;}
  if(password.length<4){toast('Password minimal 4 karakter','warn');return;}
  try{
    await api('/api/register',{method:'POST',json:{nama,role,ruangan,username,password}});
    S._authTab='login';S._prefillUser=username;render();
    toast('Pendaftaran berhasil. Silakan masuk.');
  }catch(e){toast(e.message,'warn');}
}

function fillFromStok(i){

async function submitReq(){
  const kep=document.getElementById('fk')?.value?.trim();
  if(!kep){toast('Isi keperluan permintaan','warn');return;}
  const tgl=document.getElementById('fd')?.value||'2026-06-20';
  const items=[];
  document.querySelectorAll('[id^="in-"]').forEach(el=>{
    const i=el.id.split('-')[1];
    const nama=el.value.trim();if(!nama)return;
    items.push({
      nama, jenis:document.getElementById('ij-'+i)?.value||'alkes',
      satuan:document.getElementById('is-'+i)?.value?.trim()||'pcs',
      jumlah:parseInt(document.getElementById('iq-'+i)?.value)||1
    });
  });
  if(!items.length){toast('Tambahkan minimal 1 item','warn');return;}
  try{
    const created=await api('/api/permintaan',{method:'POST',json:{
      ruangan:S.user.ruangan,pemohon:S.user.nama,pemohonUsername:S.user.username,sumber:S.user.role,
      keperluan:kep,tanggal:tgl,items,dokumenIds:S._docReq.map(f=>f.id)
    }});
    S._docReq=[];
    toast(`Permintaan ${created.id} berhasil dikirim ke Farmasi`);
    go('my-home');
  }catch(e){toast(e.message,'warn');}
}

async function saveProses(id){
  const p=S.permintaan.find(x=>x.id===id);if(!p)return;
  const items=[];let ok=true;
  p.items.forEach((it,i)=>{
    const r=document.querySelector(`input[name="ri${i}"]:checked`);
    if(!r){ok=false;return;}
    items.push({itemId:it.id,statusItem:r.value});
  });
  if(!ok){toast('Tentukan status semua item','warn');return;}
  const needPO=items.filter(x=>x.statusItem==='pengajuan').length;
  try{
    const r=await api(`/api/permintaan/${id}/proses`,{method:'POST',json:{
      items,suratPesananIds:(S._docPO[id]||[]).map(f=>f.id)
    }});
    delete S._docPO[id];
    if(r.pengajuanId){
      if(p.sumber==='laboratorium')
        toast(`Disimpan. ${r.pengajuanId} dibuat & langsung disetujui — Lab tidak perlu persetujuan Keuangan.`);
      else
        toast(`Disimpan. Pengajuan ${r.pengajuanId} dibuat untuk ${needPO} item — menunggu persetujuan Keuangan.`);
    } else {
      toast('Semua item tersedia. Permintaan '+id+' selesai.');
    }
    go('f-inbox');
  }catch(e){toast(e.message,'warn');}
}

function recalc(){
  const po=S.pengajuan.find(x=>x.id===S.keDetailId);if(!po)return;
  let total=0;
  po.items.forEach((it,i)=>{
    const v=parseInt(document.getElementById('hp'+i)?.value)||0;
    it.harga=v;total+=v*it.jumlah;
    const sub=document.getElementById('sub'+i);
    if(sub)sub.textContent=fcurr(v*it.jumlah);
  });
  po.total=total;
  const el=document.getElementById('ke-total');if(el)el.textContent=fcurr(total);
}

async function keAct(id,action){
  const po=S.pengajuan.find(x=>x.id===id);if(!po)return;
  recalc();
  const sup=document.getElementById('ke-sup')?.value?.trim()||'';
  const cat=document.getElementById('ke-cat')?.value?.trim()||'';
  if(action==='disetujui'&&!sup){toast('Isi nama supplier terlebih dahulu','warn');return;}
  if(action==='disetujui'&&!po.total){toast('Isi harga satuan item','warn');return;}
  try{
    const updated=await api(`/api/pengajuan/${id}/keputusan`,{method:'POST',json:{
      action,supplier:sup,catatan:cat,
      items:po.items.map(it=>({itemId:it.id,harga:it.harga||0}))
    }});
    if(action==='disetujui')
      toast(`Pengajuan ${id} disetujui (${fcurr(updated.total)}). Farmasi dapat melanjutkan pemesanan.`);
    else
      toast(`Pengajuan ${id} ditolak.`);
    go('ke-approval');
  }catch(e){toast(e.message,'warn');}
}

// ── Upload helpers ─────────────────────────────────────────────────────
function fmtSz(b){
  if(b<1024)return b+' B';
  if(b<1048576)return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}
function fIcon(name){
  const e=(name||'').split('.').pop().toLowerCase();
  if(e==='pdf')return 'ti-file-type-pdf';
  if(['doc','docx'].includes(e))return 'ti-file-type-doc';
  if(['jpg','jpeg','png'].includes(e))return 'ti-photo';
  return 'ti-file';
}
function docListHtml(arr, prefix, param){
  if(!arr||!arr.length)return'';
  return arr.map((f,i)=>`<div class="fitem">
    <i class="ti ${fIcon(f.name)} fi-ic"></i>
    <span class="fi-nm" title="${esc(f.name)}">${esc(f.name)}</span>
    <span class="fi-sz">${fmtSz(f.size)}</span>
    <button class="fi-rm" onclick="${prefix}Rm('${param}',${i})" title="Hapus"><i class="ti ti-x"></i></button>
  </div>`).join('');
}
function docReadonlyHtml(arr){
  if(!arr||!arr.length)return'<span style="font-size:12px;color:var(--t3)">Tidak ada lampiran</span>';
  return arr.map(f=>{
    // Di mode server file bisa diunduh/dibuka; di mode lokal hanya metadata.
    const nm=(!USE_LOCAL&&f.id)
      ?`<a class="fi-nm" href="${API}/api/files/${f.id}" target="_blank" rel="noopener" title="${esc(f.name)}" style="color:var(--info)">${esc(f.name)}</a>`
      :`<span class="fi-nm" title="${esc(f.name)}">${esc(f.name)}</span>`;
    return `<div class="fitem">
      <i class="ti ${fIcon(f.name)} fi-ic"></i>
      ${nm}
      <span class="fi-sz">${fmtSz(f.size)}</span>
    </div>`;
  }).join('');
}
async function kUpload(files){
  const up=await uploadFiles(files);
  up.forEach(f=>{if(!S._docReq.find(x=>x.name===f.name))S._docReq.push(f);});
  const el=document.getElementById('flist-req');
  if(el)el.innerHTML=docListHtml(S._docReq,'k','');
}
function kRm(_, i){
  S._docReq.splice(i,1);
  const el=document.getElementById('flist-req');
  if(el)el.innerHTML=docListHtml(S._docReq,'k','');
}
async function pUpload(reqId, files){
  if(!S._docPO[reqId])S._docPO[reqId]=[];
  const up=await uploadFiles(files);
  up.forEach(f=>{if(!S._docPO[reqId].find(x=>x.name===f.name))S._docPO[reqId].push(f);});
  const el=document.getElementById('flist-po-'+reqId);
  if(el)el.innerHTML=docListHtml(S._docPO[reqId],'p',reqId);
}
function pRm(reqId, i){
  if(!S._docPO[reqId])return;
  S._docPO[reqId].splice(i,1);
  const el=document.getElementById('flist-po-'+reqId);
  if(el)el.innerHTML=docListHtml(S._docPO[reqId],'p',reqId);
}

function fmtBulan(s){
  if(!s)return'-';
  const[y,m]=s.split('-');
  const N=['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return N[parseInt(m)]+' '+y;
}

function calcUsed(ruangan,bulan){
  return S.permintaan
    .filter(p=>p.ruangan===ruangan&&p.tanggal.startsWith(bulan)&&p.statusSerahTerima==='selesai')
    .reduce((sum,p)=>sum+p.items.reduce((s,it)=>s+(it.harga||0)*it.jumlah,0),0);
}

  const used=calcUsed(r,now), sisa=ang.nominal-used;
  const pct=ang.nominal>0?Math.min(100,Math.round(used/ang.nominal*100)):0;
  const bc=pct>=90?'var(--err)':pct>=70?'var(--warn)':'var(--ok)';
  const selesai=S.permintaan.filter(p=>p.ruangan===r&&p.statusSerahTerima==='selesai').slice().reverse();
  const sRows=selesai.map(p=>{

function recalcST(){
  const p=S.permintaan.find(x=>x.id===S.stId);if(!p)return;
  let total=0;
  p.items.forEach((it,i)=>{
    const v=parseInt(document.getElementById('sh'+i)?.value)||0;
    it.harga=v;total+=v*it.jumlah;
    const sub=document.getElementById('stsub'+i);
    if(sub)sub.textContent=fcurr(v*it.jumlah);
  });
  const el=document.getElementById('st-total');if(el)el.textContent=fcurr(total);
  const bulan=p.tanggal.substring(0,7);
  const ang=S.anggaran.find(a=>a.ruangan===p.ruangan&&a.bulan===bulan);
  const used=calcUsed(p.ruangan,bulan);
  const el2=document.getElementById('sisa-ang');
  if(el2&&ang){
    const sisa=ang.nominal-used-total;
    el2.textContent=fcurr(sisa);
    el2.style.color=sisa<0?'var(--err)':'var(--ok)';
  }
}

async function simpanSerahTerima(id){
  const p=S.permintaan.find(x=>x.id===id);if(!p)return;
  recalcST();
  const total=p.items.reduce((s,it)=>s+(it.harga||0)*it.jumlah,0);
  if(!total){toast('Isi harga minimal satu item','warn');return;}
  try{
    const r=await api(`/api/permintaan/${id}/serah-terima`,{method:'POST',json:{
      items:p.items.map(it=>({itemId:it.id,harga:it.harga||0}))
    }});
    if(r.overBudget>0)
      toast(`Perhatian: Melebihi anggaran ${fmtBulan(p.tanggal.substring(0,7))} sebesar ${fcurr(r.overBudget)}`,'warn');
    toast(`Serah terima ${id} selesai. Total nilai: ${fcurr(r.total)}`);
    go('f-serahterima');
  }catch(e){toast(e.message,'warn');}
}

async function saveStokForm(){
  const nama=document.getElementById('st-nama')?.value?.trim();
  const jenis=document.getElementById('st-jenis')?.value||'alkes';
  const satuan=document.getElementById('st-satuan')?.value?.trim()||'pcs';
  const jumlah=parseInt(document.getElementById('st-jumlah')?.value);
  const harga=parseInt(document.getElementById('st-harga')?.value)||0;
  if(!nama){toast('Isi nama item','warn');return;}
  const editId=S._stokEdit;
  try{
    if(editId){
      if(!Number.isFinite(jumlah)||jumlah<0){toast('Jumlah tidak valid','warn');return;}
      await api('/api/stok/'+editId,{method:'PUT',json:{nama,jenis,satuan,jumlah,harga}});
      toast('Item stok diperbarui');
    }else{
      if(!Number.isFinite(jumlah)||jumlah<=0){toast('Jumlah harus lebih dari 0','warn');return;}
      await api('/api/stok',{method:'POST',json:{ruangan:S.user.ruangan,nama,jenis,satuan,jumlah,harga}});
      toast(`Item "${nama}" ditambahkan ke stok`);
    }
    S._stokFormOpen=false;S._stokEdit=null;
    go('lab-stok');
  }catch(e){toast(e.message,'warn');}
}

      :`<div class="fgrid" style="margin-bottom:12px">
        <div class="fg"><label>Tanggal</label><input type="date" id="pmk-tgl" value="2026-06-20"></div>
        <div class="fg"><label>Pemakai / Petugas</label><input type="text" id="pmk-by" value="${esc(S.user.nama)}"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label style="font-size:13px;font-weight:500;color:var(--t1)">Item Dipakai</label>
        <button class="btn btn-ghost btn-sm" onclick="addPmkRow()"><i class="ti ti-plus" style="font-size:12px"></i>Tambah</button>
      </div>
      <div class="item-header" style="grid-template-columns:2.5fr 1fr 34px"><span>Item</span><span>Jumlah</span><span></span></div>
      <div id="pmk-rows">${pemakaianRow(0)}</div>
      <div class="fg full" style="margin-top:12px"><label>Keterangan</label>
        <textarea id="pmk-ket" placeholder="Tujuan / keperluan pemakaian..." style="min-height:60px"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="catatPemakaian()"><i class="ti ti-device-floppy"></i>Simpan Pemakaian</button>
      </div>`}
  </div>
  <div class="card">
    <div class="card-hd"><h3>Riwayat Pemakaian</h3></div>
    ${!hist.length
      ?`<div class="empty"><i class="ti ti-history"></i><p>Belum ada pemakaian tercatat</p></div>`
      :`<div class="tbl-wrap"><table>
        <thead><tr><th>No.</th><th>Tanggal</th><th>Item</th><th>Jumlah</th><th>Pemakai</th><th>Keterangan</th></tr></thead>
        <tbody>${hrows}</tbody>
      </table></div>`}
  </div>`;
}

async function catatPemakaian(){
  const tanggal=document.getElementById('pmk-tgl')?.value||'2026-06-20';
  const pemakai=document.getElementById('pmk-by')?.value?.trim()||S.user.nama;
  const keterangan=document.getElementById('pmk-ket')?.value?.trim()||'';
  const items=[];
  document.querySelectorAll('[id^="ps-"]').forEach(sel=>{
    const i=sel.id.split('-')[1];
    const stokId=parseInt(sel.value);
    const jumlah=parseInt(document.getElementById('pq-'+i)?.value)||0;
    if(stokId&&jumlah>0)items.push({stokId,jumlah});
  });
  if(!items.length){toast('Pilih item dan isi jumlah pemakaian','warn');return;}
  try{
    await api('/api/stok/pemakaian',{method:'POST',json:{ruangan:S.user.ruangan,tanggal,pemakai,keterangan,items}});
    toast('Pemakaian stok berhasil dicatat');
    go('lab-pemakaian');
  }catch(e){toast(e.message,'warn');}
}

// ── LAB — STOK OPNAME ──────────────────────────────────────────────────
function renderLabOpname(){
  const list=S.stok.slice().sort((a,b)=>a.nama.localeCompare(b.nama));
  const rows=list.map((x,i)=>`<tr>
    <td>${esc(x.nama)}</td>
    <td><span class="badge b-${x.jenis}">${String(x.jenis||'').toUpperCase()}</span></td>
    <td>${x.jumlah} ${esc(x.satuan)}</td>
    <td><input type="number" id="of-${i}" data-stok="${x.id}" data-sys="${x.jumlah}" value="${x.jumlah}" min="0" style="width:110px" onchange="recalcOpname()"></td>
    <td id="osel-${i}" style="font-weight:500;color:var(--t2)">0</td>
  </tr>`).join('');
  const hist=S.opname.slice();
  const hrows=hist.map(o=>`<tr>
    <td>${esc(o.id)}</td><td>${fdate(o.tanggal)}</td><td>${esc(o.petugas||'-')}</td>
    <td>${o.jumlahItem} item</td>
    <td style="font-weight:500;color:${o.totalSelisih<0?'var(--err)':o.totalSelisih>0?'var(--ok)':'var(--t2)'}">${o.totalSelisih>0?'+':''}${o.totalSelisih}</td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.catatan||'-')}</td>
  </tr>`).join('');
  return `<div class="card">
    <div class="card-hd"><h3>Stok Opname — ${esc(S.user.ruangan)}</h3></div>
    <div class="info-box info" style="margin-bottom:12px">
      <i class="ti ti-info-circle" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>
      Masukkan hasil hitung fisik tiap item. Selisih dihitung otomatis; stok sistem disesuaikan ke jumlah fisik saat disimpan.
    </div>
    ${!list.length
      ?`<div class="empty"><i class="ti ti-clipboard-check"></i><p>Belum ada stok untuk diopname.</p></div>`
      :`<div class="fgrid" style="margin-bottom:12px">
        <div class="fg"><label>Tanggal Opname</label><input type="date" id="opn-tgl" value="2026-06-20"></div>
        <div class="fg"><label>Petugas</label><input type="text" id="opn-by" value="${esc(S.user.nama)}"></div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Nama Item</th><th>Jenis</th><th>Stok Sistem</th><th>Hitung Fisik</th><th>Selisih</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="fg full" style="margin-top:12px"><label>Catatan</label>
        <textarea id="opn-ket" placeholder="Catatan penyesuaian, kondisi barang..." style="min-height:60px"></textarea></div>
      <div class="form-actions">
        <button class="btn btn-success" onclick="simpanOpname()"><i class="ti ti-clipboard-check"></i>Simpan &amp; Sesuaikan Stok</button>
      </div>`}
  </div>
  <div class="card">
    <div class="card-hd"><h3>Riwayat Stok Opname</h3></div>
    ${!hist.length
      ?`<div class="empty"><i class="ti ti-history"></i><p>Belum ada riwayat opname</p></div>`
      :`<div class="tbl-wrap"><table>
        <thead><tr><th>No.</th><th>Tanggal</th><th>Petugas</th><th>Item</th><th>Total Selisih</th><th>Catatan</th></tr></thead>
        <tbody>${hrows}</tbody>
      </table></div>`}
  </div>`;
}
function recalcOpname(){
  document.querySelectorAll('[id^="of-"]').forEach(inp=>{
    const i=inp.id.split('-')[1];
    const sys=parseInt(inp.dataset.sys)||0;
    const fis=parseInt(inp.value);
    const sel=document.getElementById('osel-'+i);
    if(!sel)return;
    const d=(Number.isNaN(fis)?sys:fis)-sys;
    sel.textContent=(d>0?'+':'')+d;
    sel.style.color=d<0?'var(--err)':d>0?'var(--ok)':'var(--t2)';
  });
}
async function simpanOpname(){
  const tanggal=document.getElementById('opn-tgl')?.value||'2026-06-20';
  const petugas=document.getElementById('opn-by')?.value?.trim()||S.user.nama;
  const catatan=document.getElementById('opn-ket')?.value?.trim()||'';
  const items=[];
  document.querySelectorAll('[id^="of-"]').forEach(inp=>{
    const stokId=parseInt(inp.dataset.stok);
    const fisik=parseInt(inp.value);
    if(stokId&&!Number.isNaN(fisik))items.push({stokId,fisik});
  });
  if(!items.length){toast('Isi hasil hitung fisik','warn');return;}
  try{
    const r=await api('/api/stok/opname',{method:'POST',json:{ruangan:S.user.ruangan,tanggal,petugas,catatan,items}});
    toast(`Opname disimpan. ${r.disesuaikan} item disesuaikan (total selisih ${r.totalSelisih>0?'+':''}${r.totalSelisih}).`);
    go('lab-opname');
  }catch(e){toast(e.message,'warn');}
}

// ── ADMIN — MANAJEMEN USER ─────────────────────────────────────────────
function renderAdminUsers(){
  const roleLbl={keperawatan:'Unit',laboratorium:'Laboratorium',farmasi:'Farmasi',keuangan:'Keuangan',manager:'Manager',direktur:'Direktur',admin:'Administrator'};
  const list=(S.users||[]).slice();
  const total=list.length;
  const pernah=list.filter(u=>u.lastLogin).length;
  const belum=total-pernah;
  const rows=list.slice().sort((a,b)=>(b.lastLogin||'').localeCompare(a.lastLogin||'')).map(u=>`<tr>
    <td>${esc(u.nama)}</td>
    <td>${esc(u.username||'-')}</td>
    <td>${esc(roleLbl[u.role]||u.role)}</td>
    <td>${esc(u.ruangan||'-')}</td>
    <td>${u.createdAt?fdt(u.createdAt):'<span style="color:var(--t3)">-</span>'}</td>
    <td>${u.lastLogin?fdt(u.lastLogin):'<span style="color:var(--t3)">Belum pernah</span>'}</td>
    <td style="text-align:center">${u.loginCount||0}</td>
  </tr>`).join('');
  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="s-val">${total}</div><div class="s-lbl">Total Pengguna Terdaftar</div></div>
    <div class="stat-card"><div class="s-val" style="color:var(--ok)">${pernah}</div><div class="s-lbl">Pernah Login</div></div>
    <div class="stat-card"><div class="s-val" style="color:var(--warn)">${belum}</div><div class="s-lbl">Belum Pernah Login</div></div>
  </div>
  <div class="card">
    <div class="card-hd"><h3>Daftar Pengguna</h3>
      <button class="btn btn-ghost btn-sm" onclick="go('admin-users')"><i class="ti ti-refresh" style="font-size:12px"></i>Muat Ulang</button>
    </div>
    <div class="info-box info" style="margin-bottom:12px">
      <i class="ti ti-info-circle" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>
      Pantau akun yang mendaftar, aktivitas login, dan waktu login terakhir tiap pengguna.
    </div>
    ${!total
      ?`<div class="empty"><i class="ti ti-users"></i><p>Belum ada pengguna terdaftar</p></div>`
      :`<div class="tbl-wrap"><table>
        <thead><tr><th>Nama</th><th>Username</th><th>Bagian</th><th>Ruangan</th><th>Terdaftar</th><th>Terakhir Login</th><th style="text-align:center">Jml Login</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
  </div>`;
}

// ── Main render ────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!S.user||S.page==='login'){root.innerHTML=renderLogin();return;}
  const pages={
    'k-home':renderKHome,'k-form':renderKForm,'k-detail':renderKDetail,'k-history':renderKHistory,
    'lab-home':renderKHome,'lab-form':renderKForm,'lab-detail':renderKDetail,'lab-history':renderKHistory,
    'lab-anggaran':renderLabAnggaran,
    'lab-stok':renderLabStok,'lab-pemakaian':renderLabPemakaian,'lab-opname':renderLabOpname,
    'admin-users':renderAdminUsers,
    'f-home':renderFHome,'f-inbox':renderFInbox,'f-proses':renderFProses,'f-pengajuan':renderFPengajuan,
    'f-serahterima':renderFSerahTerima,'f-stdetail':renderFSerahTerimaDetail,
    'ke-home':renderKeHome,'ke-approval':()=>renderKeApproval(false),'ke-detail':renderKeDetail,'ke-history':renderKeHistory,
  };
  const fn=pages[S.page]||renderKHome;
  root.innerHTML=shell(fn());
}

// ── Boot ───────────────────────────────────────────────────────────────
async function boot(){
  USE_LOCAL=!(await serverAlive());   // tidak ada server Node → mode lokal
  render();
  if(USE_LOCAL)setTimeout(()=>toast('Mode lokal aktif — data tersimpan di browser ini','info'),400);
}
boot();
</script>
</body>
</html>
